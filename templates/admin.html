<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            max-width: 800px; 
            margin: auto; 
            background: #ffffff;
            color: #333333;
        }
        h1 { margin-bottom: 20px; }
        .hidden { display: none !important; }
        .error { color: #d32f2f; margin-top: 10px; font-weight: bold; }
        .data-card { 
            background: #f5f5f5; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 6px; 
            border: 1px solid #e0e0e0;
        }
        pre { 
            background: #f5f5f5; 
            padding: 12px; 
            border-radius: 6px; 
            overflow-x: auto; 
            border: 1px solid #e0e0e0;
        }
        input[type="password"] {
            padding: 8px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <h1>Admin Dashboard Access</h1>
    
    <div id="login-section">
        <input type="password" id="secret-key" placeholder="Enter secret key">
        <button onclick="fetchDashboard()">Submit</button>
        <p id="error-msg" class="error hidden">Access Denied</p>
    </div>

    <div id="dashboard-section" class="hidden">
        <h2>Overview</h2>
        <div class="data-card"><strong>Total Analyses:</strong> <span id="total"></span></div>
        <div class="data-card"><strong>Average Score:</strong> <span id="avg"></span></div>
        <div class="data-card"><strong>Weak Count:</strong> <span id="weak"></span></div>
        <div class="data-card"><strong>Strong Count:</strong> <span id="strong"></span></div>
        <div class="data-card"><strong>Most Used Platform:</strong> <span id="platform"></span></div>
        
        <h3>Recent Entries</h3>
        <pre id="recent"></pre>
    </div>

    <script>
        let secretKey = '';

        async function fetchDashboard() {
            const keyInput = document.getElementById('secret-key').value;
            if (keyInput) {
                secretKey = keyInput;
            }

            try {
                const response = await fetch('/api/dashboard', {
                    headers: {
                        'X-Dashboard-Key': secretKey
                    }
                });

                if (response.status === 403) {
                    document.getElementById('error-msg').classList.remove('hidden');
                    document.getElementById('dashboard-section').classList.add('hidden');
                } else if (response.ok) {
                    const data = await response.json();
                    
                    document.getElementById('error-msg').classList.add('hidden');
                    document.getElementById('login-section').classList.add('hidden');
                    document.getElementById('dashboard-section').classList.remove('hidden');
                    
                    document.getElementById('total').innerText = data.total;
                    document.getElementById('avg').innerText = data.average_score;
                    document.getElementById('weak').innerText = data.weak_count;
                    document.getElementById('strong').innerText = data.strong_count;
                    document.getElementById('platform').innerText = data.most_selected_platform;
                    document.getElementById('recent').innerText = data.recent && data.recent.length ? data.recent.join('\n') : 'No recent entries';
                }
            } catch (error) {
                console.error("Error fetching dashboard:", error);
            }
        }
    </script>
</body>
</html>
